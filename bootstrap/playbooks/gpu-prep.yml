---
- name: Prepare GPU nodes for Kubernetes scheduling
  hosts: gpu
  become: true
  gather_facts: true
  tasks:
    - name: Assert supported operating system
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version is version('24.04', '>=')
        fail_msg: "Only Ubuntu 24.04 LTS or newer is supported by this lab automation."

    - name: Install NVIDIA driver meta-package
      ansible.builtin.apt:
        name:
          - nvidia-driver-570
          - nvidia-fabricmanager-570
          - ubuntu-drivers-common
        state: present
        update_cache: true

    - name: Install NVIDIA container runtime prerequisites
      ansible.builtin.apt:
        name:
          - nvidia-container-toolkit
        state: present

    - name: Ensure containerd config directory exists
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Ensure containerd drop-in directory exists
      ansible.builtin.file:
        path: /etc/containerd/conf.d
        state: directory
        mode: '0755'

    - name: Generate default containerd config if missing
      ansible.builtin.shell: |
        test -f /etc/containerd/config.toml || containerd config default >/etc/containerd/config.toml
      args:
        executable: /bin/bash
      changed_when: false

    - name: Remove misplaced containerd imports lines
      ansible.builtin.lineinfile:
        path: /etc/containerd/config.toml
        regexp: '^imports = '
        state: absent

    - name: Ensure containerd loads drop-in runtime configuration
      ansible.builtin.lineinfile:
        path: /etc/containerd/config.toml
        insertafter: '^state = '
        line: 'imports = ["/etc/containerd/conf.d/*.toml"]'

    - name: Configure NVIDIA runtime drop-in for containerd v3
      ansible.builtin.copy:
        dest: /etc/containerd/conf.d/99-nvidia.toml
        mode: '0644'
        content: |
          version = 3

          [plugins.'io.containerd.cri.v1.runtime'.containerd]
            default_runtime_name = 'nvidia'

            [plugins.'io.containerd.cri.v1.runtime'.containerd.runtimes.nvidia]
              runtime_type = 'io.containerd.runc.v2'
              privileged_without_host_devices = false
              base_runtime_spec = '/etc/containerd/cri-base.json'

              [plugins.'io.containerd.cri.v1.runtime'.containerd.runtimes.nvidia.options]
                BinaryName = '/usr/bin/nvidia-container-runtime'
                SystemdCgroup = true

    - name: Configure NVIDIA runtime with nvidia-ctk
      ansible.builtin.command:
        argv:
          - nvidia-ctk
          - runtime
          - configure
          - --runtime=containerd
          - --config=/etc/containerd/config.toml
          - --set-as-default=false

    - name: Force NVIDIA runtime as containerd default runtime
      ansible.builtin.replace:
        path: /etc/containerd/conf.d/99-nvidia.toml
        regexp: 'default_runtime_name = "runc"'
        replace: 'default_runtime_name = "nvidia"'

    - name: Ensure CNI bin directory ownership is safe for Cilium init containers
      ansible.builtin.file:
        path: /opt/cni/bin
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Restart containerd
      ansible.builtin.service:
        name: containerd
        state: restarted
        enabled: true

    - name: Restart kubelet after NVIDIA runtime changes
      ansible.builtin.service:
        name: kubelet
        state: restarted
        enabled: true

    - name: Check NVIDIA driver usability before final validation
      ansible.builtin.command:
        argv:
          - nvidia-smi
          - -L
      register: nvidia_smi_precheck
      changed_when: false
      failed_when: false

    - name: Reboot GPU host when NVIDIA userspace and kernel modules are out of sync
      ansible.builtin.reboot:
        msg: "Reboot triggered by gpu-prep after NVIDIA driver update"
        reboot_timeout: 1800
      when:
        - nvidia_smi_precheck.rc != 0
        - "'Failed to initialize NVML' in (nvidia_smi_precheck.stderr | default('')) or 'Driver/library version mismatch' in (nvidia_smi_precheck.stderr | default(''))"

    - name: Validate NVIDIA driver usability after preparation
      ansible.builtin.command:
        argv:
          - nvidia-smi
          - -L
      register: nvidia_smi_final
      changed_when: false

    - name: Assert NVIDIA GPUs are visible on the host
      ansible.builtin.assert:
        that:
          - nvidia_smi_final.rc == 0
          - "'GPU ' in nvidia_smi_final.stdout"
        fail_msg: "GPU preparation completed but nvidia-smi does not report visible GPUs."

    - name: Detect NVSwitch topology
      ansible.builtin.command:
        argv:
          - nvidia-smi
          - topo
          - -m
      register: nvidia_topology
      changed_when: false
      failed_when: false

    - name: Enable and start NVIDIA Fabric Manager on NVSwitch systems
      ansible.builtin.service:
        name: nvidia-fabricmanager
        state: started
        enabled: true
      when:
        - nvidia_topology.rc == 0
        - "'NV' in (nvidia_topology.stdout | default(''))"

    - name: Verify NVIDIA Fabric Manager on NVSwitch systems
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - nvidia-fabricmanager
      register: fabricmanager_status
      changed_when: false
      when:
        - nvidia_topology.rc == 0
        - "'NV' in (nvidia_topology.stdout | default(''))"

    - name: Assert NVIDIA Fabric Manager is active on NVSwitch systems
      ansible.builtin.assert:
        that:
          - fabricmanager_status.stdout == "active"
        fail_msg: "NVSwitch topology detected but nvidia-fabricmanager is not active."
      when:
        - nvidia_topology.rc == 0
        - "'NV' in (nvidia_topology.stdout | default(''))"

    - name: Inspect NVIDIA fabric state on NVSwitch systems
      ansible.builtin.command:
        argv:
          - nvidia-smi
          - -q
      register: nvidia_fabric_state
      changed_when: false
      when:
        - nvidia_topology.rc == 0
        - "'NV' in (nvidia_topology.stdout | default(''))"

    - name: Reboot NVSwitch systems when fabric registration is still incomplete
      ansible.builtin.reboot:
        msg: "Reboot triggered by gpu-prep after NVIDIA Fabric Manager activation"
        reboot_timeout: 1800
      when:
        - nvidia_topology.rc == 0
        - "'NV' in (nvidia_topology.stdout | default(''))"
        - "'State                             : In Progress' in (nvidia_fabric_state.stdout | default(''))"

    - name: Re-check NVIDIA fabric state on NVSwitch systems
      ansible.builtin.command:
        argv:
          - nvidia-smi
          - -q
      register: nvidia_fabric_state_final
      changed_when: false
      when:
        - nvidia_topology.rc == 0
        - "'NV' in (nvidia_topology.stdout | default(''))"

    - name: Assert NVIDIA fabric registration completed on NVSwitch systems
      ansible.builtin.assert:
        that:
          - "'State                             : In Progress' not in (nvidia_fabric_state_final.stdout | default(''))"
          - "'State                             : Completed' in (nvidia_fabric_state_final.stdout | default(''))"
          - "'Status                            : Success' in (nvidia_fabric_state_final.stdout | default(''))"
        fail_msg: "NVSwitch topology detected but GPU fabric registration is incomplete after gpu-prep."
      when:
        - nvidia_topology.rc == 0
        - "'NV' in (nvidia_topology.stdout | default(''))"
