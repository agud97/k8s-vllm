---
- name: Prepare Ubuntu hosts for Kubespray bootstrap
  hosts: all
  become: true
  gather_facts: true
  vars:
    required_packages:
      - curl
      - sudo
      - python3
      - python3-apt
      - python3-pip
      - ca-certificates
      - gnupg
      - apt-transport-https
      - software-properties-common
  tasks:
    - name: Assert supported operating system
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version is version('24.04', '>=')
        fail_msg: "Only Ubuntu 24.04 LTS or newer is supported by this lab automation."

    - name: Refresh apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required host packages
      ansible.builtin.apt:
        name: "{{ required_packages }}"
        state: present

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false
      failed_when: false

    - name: Remove swap entries from fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^(.*\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: Ensure kernel modules config exists
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: '0644'

    - name: Load required kernel modules
      ansible.builtin.shell: |
        modprobe overlay
        modprobe br_netfilter
      args:
        executable: /bin/bash
      changed_when: false

    - name: Configure sysctl for Kubernetes networking
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubernetes-cri.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1
        mode: '0644'

    - name: Apply sysctl settings
      ansible.builtin.command: sysctl --system
      changed_when: false
