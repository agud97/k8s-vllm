apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: kserve-huggingfaceserver-gpu
spec:
  supportedModelFormats:
    - name: huggingface
      version: "1"
      autoSelect: true
  containers:
    - name: kserve-container
      image: kserve/huggingfaceserver:v0.17.0-gpu
      args:
        - --model_name={{.Name}}
        - --model_dir=/mnt/models
        - --backend=vllm
        - --http_port=8080
      env:
        - name: KSERVE_OPENAI_ROUTE_PREFIX
          value: openai
      resources:
        requests:
          cpu: "4"
          memory: "24Gi"
        limits:
          nvidia.com/gpu: "1"
          cpu: "8"
          memory: "48Gi"
      volumeMounts:
        - name: model-cache
          mountPath: /mnt/models
        - name: devshm
          mountPath: /dev/shm
      ports:
        - containerPort: 8080
  nodeSelector:
    node-role.kubernetes.io/gpu: ""
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule
  volumes:
    - name: model-cache
      emptyDir: {}
    - name: devshm
      emptyDir:
        medium: Memory
