apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: vllm-openai-runtime
spec:
  supportedModelFormats:
    - name: huggingface
      version: "1"
      autoSelect: true
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:v0.17.1
      args:
        - --model=/mnt/models
        - --host=0.0.0.0
        - --port=8080
      env:
        - name: HF_HUB_DISABLE_TELEMETRY
          value: "1"
        - name: VLLM_NO_USAGE_STATS
          value: "1"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: expandable_segments:True
      resources:
        requests:
          cpu: "4"
          memory: "24Gi"
        limits:
          nvidia.com/gpu: "1"
          cpu: "8"
          memory: "48Gi"
      volumeMounts:
        - name: devshm
          mountPath: /dev/shm
      ports:
        - containerPort: 8080
  nodeSelector:
    node-role.kubernetes.io/gpu: ""
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule
  volumes:
    - name: devshm
      emptyDir:
        medium: Memory
