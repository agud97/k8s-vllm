apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: minimax-m25
  namespace: llm
  annotations:
    serving.kserve.io/deploymentMode: Standard
spec:
  predictor:
    minReplicas: 1
    serviceAccountName: llm-model-sa
    volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: minimax-m25-model-cache
    nodeSelector:
      kubernetes.io/hostname: sxmgpu
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    model:
      modelFormat:
        name: huggingface
      runtime: vllm-openai-runtime
      volumeMounts:
        - name: model-cache
          mountPath: /mnt/models
      resources:
        limits:
          nvidia.com/gpu: "4"
          cpu: "32"
          memory: "256Gi"
        requests:
          cpu: "16"
          memory: "128Gi"
      args:
        - --served-model-name=minimax-m25
        - --trust-remote-code
        - --tensor-parallel-size=4
        - --max-model-len=16384
        - --gpu-memory-utilization=0.85
        - --max-num-seqs=16
        - --enforce-eager
        - --enable-auto-tool-choice
        - --tool-call-parser=minimax_m2
        - --reasoning-parser=minimax_m2_append_think
        - --dtype=bfloat16
