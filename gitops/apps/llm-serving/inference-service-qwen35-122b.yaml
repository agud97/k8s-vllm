apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen35-122b
  namespace: llm
  annotations:
    serving.kserve.io/deploymentMode: Standard
spec:
  predictor:
    minReplicas: 1
    serviceAccountName: llm-model-sa
    nodeSelector:
      kubernetes.io/hostname: sxmgpu
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    model:
      modelFormat:
        name: huggingface
      runtime: vllm-openai-runtime
      storageUri: s3://llm/models/phase-1/Qwen__Qwen3.5-122B-A10B-FP8
      resources:
        limits:
          nvidia.com/gpu: "2"
          cpu: "16"
          memory: "128Gi"
        requests:
          cpu: "8"
          memory: "64Gi"
      args:
        - --served-model-name=qwen-122b
        - --tensor-parallel-size=2
        - --max-model-len=65536
        - --gpu-memory-utilization=0.92
        - --max-num-seqs=64
        - --enable-chunked-prefill
        - --enable-prefix-caching
        - --reasoning-parser=qwen3
        - --language-model-only
        - --dtype=auto
