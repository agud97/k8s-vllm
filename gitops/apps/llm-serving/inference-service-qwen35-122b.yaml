apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen35-122b
  namespace: llm
  annotations:
    serving.kserve.io/deploymentMode: Standard
spec:
  predictor:
    minReplicas: 1
    serviceAccountName: llm-model-sa
    volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: qwen35-122b-model-cache
    nodeSelector:
      kubernetes.io/hostname: sxmgpu
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    model:
      modelFormat:
        name: huggingface
      runtime: vllm-openai-runtime
      volumeMounts:
        - name: model-cache
          mountPath: /mnt/models
      resources:
        limits:
          nvidia.com/gpu: "2"
          cpu: "16"
          memory: "128Gi"
        requests:
          cpu: "8"
          memory: "64Gi"
      args:
        - --served-model-name=qwen-122b
        - --chat-template-content-format=auto
        - --dtype=auto
        - --tensor-parallel-size=2
        - --max-model-len=262144
        - --max-num-seqs=24
        - --max-num-batched-tokens=16384
        - --reasoning-parser=qwen3
        - --tool-call-parser=qwen3_coder
        - --enable-auto-tool-choice
        - '--default-chat-template-kwargs={"enable_thinking":false}'
        - --language-model-only
        - --enforce-eager
        - --gpu-memory-utilization=0.88
