apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen3-coder
  namespace: llm
  annotations:
    serving.kserve.io/deploymentMode: Standard
spec:
  predictor:
    minReplicas: 1
    serviceAccountName: llm-model-sa
    nodeSelector:
      kubernetes.io/hostname: sxmgpu
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    model:
      modelFormat:
        name: huggingface
      runtime: vllm-openai-runtime
      storageUri: s3://llm/models/phase-1/Qwen__Qwen3-Coder-Next
      resources:
        limits:
          nvidia.com/gpu: "2"
          cpu: "16"
          memory: "128Gi"
        requests:
          cpu: "8"
          memory: "64Gi"
      args:
        - --served-model-name=qwen-coder
        - --tensor-parallel-size=2
        - --dtype=bfloat16
        - --max-model-len=131072
        - --gpu-memory-utilization=0.92
        - --max-num-seqs=32
        - --enable-chunked-prefill
        - --enable-prefix-caching
        - --enable-auto-tool-choice
        - --tool-call-parser=qwen3_coder
