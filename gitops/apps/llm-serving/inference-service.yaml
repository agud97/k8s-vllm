apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen35-27b-gptq-int4
  namespace: llm
  annotations:
    serving.kserve.io/deploymentMode: Standard
spec:
  predictor:
    minReplicas: 1
    serviceAccountName: llm-model-sa
    nodeSelector:
      node-role.kubernetes.io/gpu: ""
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    model:
      modelFormat:
        name: huggingface
      runtime: vllm-openai-runtime
      storageUri: hf://Qwen/Qwen3.5-27B-GPTQ-Int4
      resources:
        limits:
          nvidia.com/gpu: "1"
          cpu: "8"
          memory: "48Gi"
        requests:
          cpu: "4"
          memory: "24Gi"
      args:
        - --dtype=float16
        - --quantization=gptq_marlin
        - --max-model-len=4096
        - --gpu-memory-utilization=0.92
        - --trust-remote-code
        - --enforce-eager
