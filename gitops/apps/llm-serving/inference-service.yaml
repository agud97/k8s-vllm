apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen35-9b
  namespace: llm
  annotations:
    serving.kserve.io/deploymentMode: Standard
spec:
  predictor:
    minReplicas: 1
    serviceAccountName: llm-model-sa
    nodeSelector:
      kubernetes.io/hostname: sxmgpu
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    model:
      modelFormat:
        name: huggingface
      runtime: vllm-openai-runtime
      storageUri: s3://llm/models/phase-1/Qwen__Qwen3.5-9B
      resources:
        limits:
          nvidia.com/gpu: "1"
          cpu: "8"
          memory: "40Gi"
        requests:
          cpu: "4"
          memory: "20Gi"
      args:
        - --served-model-name=qwen35-9b
        - --dtype=float16
        - --language-model-only
        - --max-model-len=4096
        - --gpu-memory-utilization=0.9
        - --trust-remote-code
        - --enforce-eager
