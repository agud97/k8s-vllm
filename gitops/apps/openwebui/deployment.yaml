apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openwebui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openwebui
    spec:
      nodeSelector:
        node-role.kubernetes.io/infra: ""
      tolerations:
        - key: node-role.kubernetes.io/infra
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:v0.7.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: OPENAI_API_BASE_URL
              value: http://litellm.llm.svc:4000/v1
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-auth
                  key: master-key
            - name: WEBUI_ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: openwebui-admin
                  key: admin-name
            - name: WEBUI_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: openwebui-admin
                  key: admin-email
            - name: WEBUI_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openwebui-admin
                  key: admin-password
            - name: ENABLE_OLLAMA_API
              value: "false"
            - name: WEBUI_NAME
              value: Open WebUI
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          emptyDir: {}
