apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-dcgm-exporter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "23"
spec:
  project: platform
  source:
    repoURL: https://nvidia.github.io/dcgm-exporter/helm-charts
    chart: dcgm-exporter
    targetRevision: 4.8.1
    helm:
      releaseName: dcgm-exporter
      values: |
        nodeSelector:
          node-role.kubernetes.io/gpu: ""
        tolerations:
          - key: nvidia.com/gpu
            operator: Equal
            value: "true"
            effect: NoSchedule
        serviceMonitor:
          enabled: false
        kubernetes:
          enablePodLabels: true
          enablePodUID: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
