apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-nvidia-device-plugin
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: platform
  source:
    repoURL: https://github.com/agud97/k8s-vllm.git
    targetRevision: main
    path: gitops/infra/nvidia-device-plugin
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
