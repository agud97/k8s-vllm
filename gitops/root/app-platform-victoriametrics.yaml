apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-victoriametrics
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "22"
spec:
  project: platform
  source:
    repoURL: https://victoriametrics.github.io/helm-charts
    chart: victoria-metrics-k8s-stack
    targetRevision: 0.72.5
    helm:
      releaseName: vmstack
      values: |
        argocdReleaseOverride: vmstack
        defaultDashboards:
          enabled: true
          annotations:
            argocd.argoproj.io/sync-options: ServerSideApply=true
        alertmanager:
          enabled: false
        vmalert:
          enabled: false
        victoria-metrics-operator:
          nodeSelector:
            node-role.kubernetes.io/infra: ""
          tolerations:
            - key: node-role.kubernetes.io/infra
              operator: Equal
              value: "true"
              effect: NoSchedule
        kube-state-metrics:
          nodeSelector:
            node-role.kubernetes.io/infra: ""
          tolerations:
            - key: node-role.kubernetes.io/infra
              operator: Equal
              value: "true"
              effect: NoSchedule
        vmsingle:
          enabled: true
          spec:
            extraArgs: {}
            retentionPeriod: 7d
            storage:
              storageClassName: openebs-hostpath
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 100Gi
            nodeSelector:
              node-role.kubernetes.io/infra: ""
            tolerations:
              - key: node-role.kubernetes.io/infra
                operator: Equal
                value: "true"
                effect: NoSchedule
        vmagent:
          spec:
            externalLabels:
              cluster: k8s-vllm-lab
            nodeSelector:
              node-role.kubernetes.io/infra: ""
            tolerations:
              - key: node-role.kubernetes.io/infra
                operator: Equal
                value: "true"
                effect: NoSchedule
        grafana:
          enabled: true
          nodeSelector:
            node-role.kubernetes.io/infra: ""
          tolerations:
            - key: node-role.kubernetes.io/infra
              operator: Equal
              value: "true"
              effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
