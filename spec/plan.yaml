plan:
  name: "Non-Managed Kubernetes Lab With GitOps LLM Serving"
  phases:
    - id: phase-1
      name: "Repository Foundation"
      description: "Prepare the repository, local inputs, and execution entrypoints required to perform a real deployment onto the provided virtual machines."
      tasks:
        - id: task-1.1
          name: "Create repository skeleton"
          description: "Create the top-level directories for bootstrap automation, inventory, GitOps manifests, platform packaging, documentation, and tests."
          artifact: "bootstrap/, inventory/, gitops/, platform/ or charts/, docs/, tests/"
          depends_on: []
          validation: "Repository tree matches the required structure and is sufficient to support a real deployment workflow."
        - id: task-1.2
          name: "Define local input contract"
          description: "Create or normalize ignored local configuration files for host inventory, S3 settings, and any bootstrap-only secrets required outside Git."
          artifact: "local/README.md, local/hosts.yml, local/s3.env, .gitignore"
          depends_on:
            - task-1.1
          validation: "Local files are documented, ignored by Git, and provide all inputs needed by bootstrap automation."
        - id: task-1.3
          name: "Add dependency matrix"
          description: "Create a pinned dependency matrix declaring versions of Kubespray, Kubernetes, Cilium, Istio, ArgoCD, KServe, vLLM, LiteLLM, VictoriaMetrics, Sealed Secrets, OpenEBS, and NVIDIA Device Plugin, plus any conditionally enabled dependencies."
          artifact: "docs/dependency-matrix.yaml or equivalent repository-owned matrix file"
          depends_on:
            - task-1.1
          validation: "The matrix exists in the repository and explicitly lists selected versions and optional dependencies for the chosen version set."
        - id: task-1.4
          name: "Create root bootstrap and validation entrypoints"
          description: "Add the primary commands or wrapper scripts for bootstrap, deploy, validate, and smoke-test flows."
          artifact: "Makefile or root task runner plus bootstrap/ scripts"
          depends_on:
            - task-1.1
            - task-1.2
          validation: "Documented root commands exist and are ready to be used for the real deployment workflow."
      checkpoint:
        description: "Review the repository structure and input contract before live deployment starts."
        criteria:
          - "The repository layout supports bootstrap, GitOps, documentation, tests, and live deployment without mixing concerns."
          - "All local-only inputs are clearly separated from Git-managed content."
          - "The dependency matrix exists and is acceptable as the source of truth for version pinning."

    - id: phase-2
      name: "Cluster Bootstrap And Node Preparation"
      description: "Prepare the hosts and execute Kubernetes installation until a Ready cluster with GPU-capable nodes exists on the target virtual machines."
      tasks:
        - id: task-2.1
          name: "Build Kubespray inventory and host variables"
          description: "Create the machine-readable inventory for the lab nodes, including role metadata required for placement and any explicit control-plane access addresses needed for worker onboarding over public IPs."
          artifact: "inventory/ hosts and group variables"
          depends_on:
            - task-1.2
            - task-1.3
          validation: "Inventory files represent all six nodes and encode the intended node roles."
        - id: task-2.2
          name: "Implement host preparation automation"
          description: "Create idempotent automation to prepare Ubuntu 24.04 hosts with required packages, container runtime settings, and prerequisites for Kubespray."
          artifact: "bootstrap/host-prep scripts or playbooks"
          depends_on:
            - task-2.1
          validation: "Preparation automation runs idempotently on the target hosts and fails clearly on missing prerequisites."
        - id: task-2.3
          name: "Implement Kubernetes bootstrap"
          description: "Automate Kubespray-based cluster creation targeting containerd and Cilium for the defined node topology, including rerunnable worker onboarding and recovery when replacement nodes can reach the API only through public control-plane addresses."
          artifact: "bootstrap/cluster-bootstrap scripts and Kubespray configuration"
          depends_on:
            - task-2.1
            - task-2.2
          validation: "Bootstrap is executed against the target hosts and produces a Ready cluster with the currently intended live nodes visible and Cilium active, including safe worker onboarding after partial failure or node replacement."
        - id: task-2.4
          name: "Implement GPU node enablement"
          description: "Install NVIDIA drivers, NVIDIA container runtime support, and the NVIDIA Device Plugin on GPU nodes, including validation and recovery for reboots, runtime configuration drift, Cilium dependencies surfaced during node replacement, and NVSwitch fabric-manager requirements on H200-class hosts."
          artifact: "bootstrap/gpu scripts or playbooks plus GitOps manifests for device plugin if applicable"
          depends_on:
            - task-2.3
          validation: "GPU enablement is executed on the target hosts, GPU nodes expose `nvidia.com/gpu` resources, runtime configuration is sufficient for the NVIDIA Device Plugin, NVSwitch-based hosts pass fabric initialization checks, and the deployment does not depend on NVIDIA GPU Operator."
        - id: task-2.5
          name: "Implement baseline cluster validation"
          description: "Add validation scripts to verify host reachability, cluster readiness, Cilium health, and GPU discovery."
          artifact: "tests/validate-cluster.*"
          depends_on:
            - task-2.3
            - task-2.4
          validation: "Validation scripts are executed against the live cluster, pass on a healthy cluster, and fail clearly when a required host or GPU resource is missing."
      checkpoint:
        description: "Review the working cluster baseline before GitOps platform components are layered on top."
        criteria:
          - "All six nodes are actually Ready in the live cluster and role assignment is correct."
          - "Cilium is active and GPU discovery works via NVIDIA Device Plugin."
          - "Bootstrap has actually been executed and rerun behavior is acceptable for the lab environment."

    - id: phase-3
      name: "GitOps Platform And Storage Layer"
      description: "Bootstrap ArgoCD on the live cluster and deploy the foundational GitOps-managed platform services needed by later serving workloads."
      tasks:
        - id: task-3.1
          name: "Bootstrap ArgoCD and self-management"
          description: "Implement the one-time ArgoCD bootstrap path and the GitOps self-management structure."
          artifact: "gitops/argocd manifests plus bootstrap/argocd-bootstrap automation"
          depends_on:
            - task-1.4
            - task-2.3
          validation: "ArgoCD is actually installed on the live cluster, becomes operational, is reachable via port-forward, and reconciles its own repository-managed configuration."
        - id: task-3.2
          name: "Implement secrets bootstrap"
          description: "Deploy Sealed Secrets, document key preservation, and provide the bootstrap flow for reusable sealed secret material outside Git."
          artifact: "gitops/infra/sealed-secrets and docs/secrets runbook"
          depends_on:
            - task-3.1
          validation: "Sealed Secrets is actually deployed and healthy on the live cluster, plaintext secrets are absent from Git, and rebuild documentation covers key reuse."
        - id: task-3.3
          name: "Implement storage and node-role platform add-ons"
          description: "Deploy OpenEBS LocalPV and any required node-role or scheduling support needed by infra and GPU workloads."
          artifact: "gitops/infra/openebs and related placement configuration"
          depends_on:
            - task-3.1
          validation: "OpenEBS LocalPV is actually deployed, available on the live cluster, and storage classes required by the lab design are present."
        - id: task-3.4
          name: "Implement ingress and service mesh path"
          description: "Deploy Istio and configure the NodePort-based external inference path on infra-1."
          artifact: "gitops/infra/istio and ingress exposure manifests"
          depends_on:
            - task-3.1
            - task-3.3
          validation: "Istio control plane is actually healthy on the live cluster and the intended NodePort exposure path is configured on infra-1."
        - id: task-3.5
          name: "Implement platform validation for GitOps layer"
          description: "Add validation scripts for ArgoCD, Sealed Secrets, OpenEBS, and Istio."
          artifact: "tests/validate-platform.*"
          depends_on:
            - task-3.2
            - task-3.3
            - task-3.4
          validation: "Validation scripts are executed against the live cluster, confirm health of the GitOps platform components, and fail observably on missing dependencies."
      checkpoint:
        description: "Review the GitOps platform baseline before model-serving components are integrated."
        criteria:
          - "ArgoCD reconciliation is stable, self-managed, and running on the live cluster."
          - "Sealed Secrets and OpenEBS behave according to the storage and secret-management design."
          - "Istio and NodePort exposure are actually ready on the live cluster for application-layer integration."

    - id: phase-4
      name: "Serving And Observability Integration"
      description: "Execute model artifact flow, deploy KServe/vLLM serving, expose LiteLLM publicly, and deploy VictoriaMetrics observability on the live cluster."
      tasks:
        - id: task-4.1
          name: "Implement model artifact synchronization"
          description: "Create the rerunnable workflow that stages `Qwen/Qwen3.5-122B-A10B-FP8`, `MiniMaxAI/MiniMax-M2.5`, and `Qwen/Qwen3-Coder-Next` artifacts into S3 and supplies the serving configuration with the correct locations."
          artifact: "bootstrap/model-sync scripts and GitOps values for S3-backed model source"
          depends_on:
            - task-1.2
            - task-3.2
            - task-3.3
          validation: "Model sync is actually executed, succeeds with valid S3 credentials, and fails observably when credentials or endpoint settings are invalid."
        - id: task-4.2
          name: "Implement KServe and vLLM serving stack"
          description: "Deploy the three single-replica non-distributed KServe InferenceServices for `qwen35-122b`, `minimax-m25`, and `qwen3-coder`, using the pinned S3-backed model sources, the shared multi-GPU runtime settings, and the required version-set dependencies."
          artifact: "gitops/platform/kserve and gitops/apps/llm-serving manifests"
          depends_on:
            - task-3.4
            - task-4.1
          validation: "The serving stack is actually deployed to the live cluster, becomes healthy within the acceptance window, and the workload schedules only on GPU-capable nodes."
        - id: task-4.3
          name: "Implement LiteLLM integration and public access"
          description: "Deploy LiteLLM with pinned model aliases for `qwen-122b`, `minimax-m25`, `qwen-coder`, and `default`, using the current public-fallback OpenAI-compatible upstream endpoints for all three predictors, native API key auth, and NodePort-based public access."
          artifact: "gitops/apps/litellm manifests and sealed secrets for API keys"
          depends_on:
            - task-4.2
            - task-3.2
            - task-3.4
          validation: "LiteLLM is actually deployed to the live cluster, requests without valid API keys fail, valid requests route through LiteLLM, and the configured upstream contract matches the specification."
        - id: task-4.4
          name: "Implement VictoriaMetrics stack"
          description: "Deploy VictoriaMetrics Kubernetes stack with 7-day retention, 100Gi persistent storage, the required metric targets and dashboards, explicit GPU telemetry collection for active GPU nodes, and datasource configuration aligned with the cluster DNS domain declared in inventory."
          artifact: "gitops/platform/victoriametrics manifests"
          depends_on:
            - task-3.3
            - task-3.4
          validation: "VictoriaMetrics is actually deployed to the live cluster, is healthy, PVCs request 100Gi, retention is set to 7 days, required target coverage is present, GPU metrics are collected through the approved exporter path, and Grafana datasources resolve in-cluster service FQDNs using the actual cluster DNS domain."
        - id: task-4.5
          name: "Implement integration validation"
          description: "Add cluster-dependent validation for serving readiness, LiteLLM auth, S3-backed model access, NodePort reachability, and observability coverage."
          artifact: "tests/validate-serving.* and tests/validate-observability.*"
          depends_on:
            - task-4.2
            - task-4.3
            - task-4.4
          validation: "Integration validation is executed against the live cluster and covers positive and negative paths for serving, auth, storage access, and observability health."
      checkpoint:
        description: "Review the fully integrated serving and observability layer before finalizing documentation and test completion."
        criteria:
          - "KServe, vLLM, and LiteLLM actually work together on the live cluster through the defined phase-1 contract."
          - "Public access works only through the expected NodePort and API key flow."
          - "VictoriaMetrics is running on the live cluster and provides the required metrics and dashboards."

    - id: phase-5
      name: "Final Validation And Operator Documentation"
      description: "Complete live validation, smoke tests, and operator-facing documentation required for handoff of a working cluster."
      tasks:
        - id: task-5.1
          name: "Implement static validation suite"
          description: "Add static validation for YAML, Helm or Kustomize inputs, shell scripts, pinned version checks, and cluster-DNS alignment in GitOps manifests that build in-cluster service FQDNs."
          artifact: "tests/static/ and root validation targets"
          depends_on:
            - task-1.4
            - task-3.1
            - task-4.4
          validation: "Static checks run from the repository without cluster access and fail on malformed manifests, shell issues, floating versions, or cluster-DNS mismatches between inventory and GitOps manifests."
        - id: task-5.2
          name: "Implement smoke test suite"
          description: "Create the repeatable smoke test for the pinned LiteLLM model alias using the documented prompt and acceptance thresholds."
          artifact: "tests/smoke-test.*"
          depends_on:
            - task-4.3
          validation: "The smoke test is executed against the live deployment, returns HTTP 200, non-empty generated text, no runtime error, and completes within 60 seconds."
        - id: task-5.3
          name: "Write operator runbook"
          description: "Document bootstrap, local inputs, dependency matrix usage, validation commands, recovery for lab rebuilds, GPU node replacement and onboarding, and the sample smoke-test request and response."
          artifact: "README.md and docs/runbooks/*"
          depends_on:
            - task-5.1
            - task-5.2
          validation: "Documentation contains step-by-step bootstrap instructions, verification commands, actual final endpoint details, and sample smoke-test artifacts without requiring screenshots."
        - id: task-5.4
          name: "Execute final end-to-end validation"
          description: "Run the documented validation flow from bootstrap through post-deployment smoke tests and confirm all acceptance-facing artifacts are present."
          artifact: "Validated repository state and documented validation command set"
          depends_on:
            - task-5.1
            - task-5.2
            - task-5.3
          validation: "All automated validations and smoke tests are actually executed against the live cluster and pass, and the repository contains every artifact required by the acceptance criteria."
      checkpoint:
        description: "Review the completed implementation package before coding handoff is considered done."
        criteria:
          - "The automated validation suite is complete, aligned with acceptance criteria, and has been executed against the live cluster."
          - "Operator documentation is sufficient to reproduce the lab deployment from the repository."
          - "End-to-end validation demonstrates the specified lab behavior on the live cluster without undocumented manual steps."
